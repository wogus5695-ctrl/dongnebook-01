<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>광고 상담 및 입점 신청서 접수 | 동네책자</title>
  <meta name="description" content="동네책자의 시공·수리 광고 구좌 신청서입니다. 원하시는 지역과 작업 키워드를 작성하여 신청하시면 빠른 상담을 도와드립니다.">
  <link rel="stylesheet" href="/src/css/main.css">
  <style>
    .form-section-card {
      background-color: var(--bg-card);
      border: 1.5px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 24px;
      margin-top: 16px;
    }
    .form-group-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--secondary);
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 6px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <!-- 공통 헤더 마운트 -->
  <div id="header-container"></div>

  <main class="container">
    
    <!-- 타이틀 안내 -->
    <section class="section" style="border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
      <span class="ad-badge">B2B 입점 창구</span>
      <h1 class="section-title" style="font-size: 1.6rem; color: var(--secondary);">광고 입점 상담 신청서</h1>
      <p class="section-subtitle">원하시는 타겟 구좌와 지역을 알려주시면 담당 매니저가 유선 혹은 카카오톡으로 개별 안내해 드립니다.</p>
    </section>

    <!-- 상담 폼 구역 -->
    <section class="section" style="padding: 16px 0;">
      <form id="ad-platform-apply-form" class="form-section-card" novalidate>
        
        <!-- 파트 A. 필수 입력 사항 -->
        <div class="form-group-title">기본 필수 정보</div>

        <div class="form-group">
          <label class="form-label" for="companyName">업체명 <span style="color: red;">*</span></label>
          <input type="text" id="companyName" class="form-input" placeholder="예: 바른하수구공사" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="ownerName">담당자명 <span style="color: red;">*</span></label>
          <input type="text" id="ownerName" class="form-input" placeholder="예: 홍길동 대표" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">연락처 <span style="color: red;">*</span></label>
          <input type="tel" id="phone" class="form-input" placeholder="예: 010-1234-5678" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="category">업종 카테고리 선택 <span style="color: red;">*</span></label>
          <select id="category" class="form-select" required>
            <option value="">업종을 선택해 주세요</option>
            <option value="general-cleaning">종합청소</option>
            <option value="waterproof-leak">방수/누수</option>
            <option value="window-caulking">창틀코킹/창틀누수</option>
            <option value="drain-clog">하수구막힘</option>
            <option value="etc">기타 (직접 작성)</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="targetRegion">광고 노출 희망 지역 <span style="color: red;">*</span></label>
          <input type="text" id="targetRegion" class="form-input" placeholder="예: 서울 강남구 역삼동, 경기 수원시 장안구 전체" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="targetWork">광고 노출 희망 작업명 <span style="color: red;">*</span></label>
          <input type="text" id="targetWork" class="form-input" placeholder="예: 창틀코킹, 아파트유리창청소, 싱크대역류 막힘" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="adProduct">광고 희망 상품 플랜 <span style="color: red;">*</span></label>
          <select id="adProduct" class="form-select" required>
            <option value="">원하시는 광고 예산 상품을 선택하세요</option>
            <option value="product-single">지역 1개 + 작업명 1개 광고 카드 노출 / 월 5만원</option>
            <option value="product-triple">지역 3개 패키지 / 월 12만원</option>
            <option value="product-five">지역 5개 패키지 / 월 20만원</option>
            <option value="product-banner">카테고리 상단 배너 / 별도 문의</option>
            <option value="decision-after-consult">상담 후 결정</option>
          </select>
        </div>

        <!-- 파트 B. 선택 입력 사항 -->
        <div class="form-group-title" style="margin-top: 32px;">부가 선택 정보</div>

        <div class="form-group">
          <label class="form-label" for="kakaoLink">카카오톡 채널/오픈프로필 주소</label>
          <input type="url" id="kakaoLink" class="form-input" placeholder="https://open.kakao.com/...">
        </div>

        <div class="form-group">
          <label class="form-label" for="homepageUrl">공식 홈페이지 URL</label>
          <input type="url" id="homepageUrl" class="form-input" placeholder="https://example.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="blogUrl">공식 네이버 블로그 URL</label>
          <input type="url" id="blogUrl" class="form-input" placeholder="https://blog.naver.com/...">
        </div>

        <div class="form-group">
          <label class="form-label" for="instaUrl">인스타그램 계정 URL</label>
          <input type="url" id="instaUrl" class="form-input" placeholder="https://instagram.com/...">
        </div>

        <div class="form-group">
          <label class="form-label" for="hasBizLicense">사업자 등록 여부</label>
          <select id="hasBizLicense" class="form-select">
            <option value="yes">유효한 사업자등록증 보유함</option>
            <option value="no">현재 무등록 (추후 등록/상담 필요)</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="additionalMessage">추가 요청사항 및 문의 내용</label>
          <textarea id="additionalMessage" class="form-textarea" rows="4" placeholder="출장 범위나 포트폴리오 자료 등 전달할 내용을 입력해 주세요."></textarea>
        </div>

        <!-- 파트 C. 약관 동의 -->
        <div class="form-group" style="margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 16px;">
          <label class="form-checkbox">
            <input type="checkbox" id="privacyConsent" required>
            <span style="line-height: 1.4;">
              [필수] 광고 상담 및 신청 처리를 위해 입력한 개인정보 수집·이용에 동의합니다. 
              <a href="/policy.html?tab=privacy" target="_blank" style="text-decoration: underline; color: var(--primary); font-weight: 700;">[개인정보처리방침 보기]</a>
            </span>
          </label>
        </div>

        <!-- 결제 버튼이 아닌 신청서 제출 안내 -->
        <div style="margin-top: 32px;">
          <button type="submit" id="submit-btn" class="btn btn-primary">신청 후 운영자 안내 받기</button>
          <p style="font-size: 0.75rem; color: var(--text-muted); text-center; margin-top: 8px;">
            ※ 본 접수는 즉시 자동 승인되지 않으며, 매니저가 기재된 연락처로 상담 심사를 수동 진행한 후 광고 비용 정산법을 안내해 드립니다.
          </p>
        </div>

      </form>
    </section>

  </main>

  <!-- 공통 푸터 마운트 -->
  <div id="footer-container"></div>

  <script type="module">
    import { renderHeader } from '/src/components/Header.js';
    import { renderFooter } from '/src/components/Footer.js';

    renderHeader();
    renderFooter();

    // ----------------------------------------------------
    // [보안 설정: 실제 연동시 여기에 Google Web App URL을 대입하세요]
    // ----------------------------------------------------
    const GOOGLE_SCRIPT_URL = "YOUR_REAL_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

    // URL 쿼리 파라미터 연계 주입
    const urlParams = new URLSearchParams(window.location.search);
    const regParam = urlParams.get('reg');
    const catParam = urlParams.get('cat');
    const taskParam = urlParams.get('task');
    const prodParam = urlParams.get('prod');

    if (regParam) document.getElementById('targetRegion').value = regParam;
    if (taskParam) {
      const taskDisplayMap = {
        "window-cleaning": "유리창청소",
        "exterior-cleaning": "외벽청소",
        "window-caulking-task": "창틀코킹",
        "window-leak": "창틀누수",
        "rain-leak": "빗물누수",
        "drain-clogged": "하수구막힘",
        "sink-clogged": "싱크대막힘",
        "rooftop-waterproofing": "옥상방수"
      };
      document.getElementById('targetWork').value = taskDisplayMap[taskParam] || taskParam;
    }
    if (catParam) {
      const selectBox = document.getElementById('category');
      if (selectBox.querySelector(`option[value="${catParam}"]`)) {
        selectBox.value = catParam;
      }
    }
    if (prodParam) {
      const prodSelect = document.getElementById('adProduct');
      if (prodSelect.querySelector(`option[value="${prodParam}"]`)) {
        prodSelect.value = prodParam;
      }
    }

    // 폼 제출 이벤트 리스너
    const form = document.getElementById('ad-platform-apply-form');
    const submitBtn = document.getElementById('submit-btn');
    
    if (form) {
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        // 1. 유효성 검증
        if (!form.checkValidity()) {
          alert("입력되지 않았거나 올바르지 않은 양식의 필수 입력 필드가 존재합니다. 확인 후 다시 시도해 주세요.");
          return;
        }

        // 2. 중복 제출 가드 가동 (버튼 비활성화)
        submitBtn.disabled = true;
        const originalBtnText = submitBtn.textContent;
        submitBtn.textContent = "신청서 전송 중...";

        // 3. 데이터 취합
        const categorySelect = document.getElementById('category');
        const productSelect = document.getElementById('adProduct');
        
        const now = new Date();
        const formattedDate = now.getFullYear() + "-" + 
                            String(now.getMonth() + 1).padStart(2, '0') + "-" + 
                            String(now.getDate()).padStart(2, '0') + " " + 
                            String(now.getHours()).padStart(2, '0') + ":" + 
                            String(now.getMinutes()).padStart(2, '0') + ":" + 
                            String(now.getSeconds()).padStart(2, '0');

        const formData = {
          submittedAt: formattedDate,
          companyName: document.getElementById('companyName').value.trim(),
          ownerName: document.getElementById('ownerName').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          category: categorySelect.value,
          categoryName: categorySelect.options[categorySelect.selectedIndex].text,
          targetRegion: document.getElementById('targetRegion').value.trim(),
          targetWork: document.getElementById('targetWork').value.trim(),
          adProduct: productSelect.value,
          adProductName: productSelect.options[productSelect.selectedIndex].text,
          kakaoLink: document.getElementById('kakaoLink').value.trim(),
          homepageUrl: document.getElementById('homepageUrl').value.trim(),
          blogUrl: document.getElementById('blogUrl').value.trim(),
          instaUrl: document.getElementById('instaUrl').value.trim(),
          hasBizLicense: document.getElementById('hasBizLicense').value,
          additionalMessage: document.getElementById('additionalMessage').value.trim(),
          privacyConsent: document.getElementById('privacyConsent').checked
        };

        // 4. 연동 릴레이 전송 핸들러 실행
        try {
          const success = await triggerExternalRelay(formData);
          if (success) {
            alert("광고 신청이 접수되었습니다. 운영자가 확인 후 연락드리겠습니다.");
            form.reset();
            window.location.href = "/";
          } else {
            throw new Error("Relay response state failed");
          }
        } catch (error) {
          console.error("[연동 에러]:", error);
          alert("신청 접수 중 문제가 발생했습니다. 잠시 후 다시 시도하거나 전화 문의를 이용해주세요.");
        } finally {
          // 전송 성공/실패 여부 관계없이 최종 복원
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
        }
      });
    }

    /**
     * 구글 웹앱 서버(Relay)에 비동기 POST 전송
     */
    async function triggerExternalRelay(data) {
      console.log("[디버그 페이로드 전송 확인]:", data);

      // 플레이스홀더 주소 상태라면 목업(Mock) 브라우저 로컬 데이터 처리 후 성공으로 모사 처리
      if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.indexOf("YOUR_REAL_GOOGLE") !== -1) {
        return new Promise((resolve) => {
          setTimeout(() => {
            console.log("[Mock 전송 완료] 실제 Web App URL 배포 후 대입 시 GAS 통신이 개시됩니다.");
            resolve(true);
          }, 1000);
        });
      }

      // 실제 GAS 통신
      const response = await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // Apps Script 리다이렉트 지원용 CORS 해제 모드
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });
      
      return true; // no-cors는 결과 리턴을 가로채지 못하므로 전송 성공 시 true로 반환 처리
    }
  </script>
</body>
</html>
